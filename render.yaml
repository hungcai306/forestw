databases:
  - name: hue-forestwatch-db
    databaseName: forestwatch
    user: forestwatch
    plan: free
    region: singapore
    postgresMajorVersion: "16"

services:
  - type: web
    name: hue-forestwatch-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hue-forestwatch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://hue-forestwatch-web.onrender.com
      - key: SADMIN_USERNAME
        value: sadmin
      - key: SADMIN_PASSWORD
        sync: false
      - key: ADMIN_API_BASE
        value: https://34tinhthanh.com/api

  - type: web
    name: hue-forestwatch-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://hue-forestwatch-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
